name: Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Elan
      run: |
        curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y
        echo "$HOME/.elan/bin" >> $GITHUB_PATH

    - name: Update PATH
      run: echo "$HOME/.elan/bin" >> $GITHUB_PATH

    - name: Install Lean toolchain
      run: |
        elan default leanprover/lean4:v4.27.0-rc1

    - name: Lake update
      run: lake update

    - name: Build project
      run: lake build

    - name: Run Counter example
      run: lake env lean --run Examples/Counter.lean

    - name: Run Sparkle-16 CPU Core
      run: lake env lean --run Examples/Sparkle16/Core.lean

    - name: Run ISA Proof Tests
      run: |
        lake build Sparkle.Verification.ISAProps
        lake env lean --run Examples/Sparkle16/ISAProofTests.lean

    - name: Build RV32 Signal DSL
      run: lake build Examples.RV32

    - name: Verify with iverilog (optional)
      continue-on-error: true
      run: |
        if command -v iverilog &> /dev/null; then
          if [ -f "hw/sim/tb_rv32.v" ]; then
            iverilog -g2012 -o /tmp/rv32i_sim hw/gen/rv32i_soc.sv hw/sim/tb_rv32.v
            vvp /tmp/rv32i_sim
          else
            echo "No testbench found, skipping"
          fi
        else
          echo "iverilog not installed, skipping"
        fi
